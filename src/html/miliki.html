<section id="waitlist">
  <div class="container">
    <h2>Join the InvestorMind Academy Waitlist</h2>
    <p class="wl-sub">Be first to access Kenya's premier financial literacy platform.</p>
    <form class="wl-form" id="waitlistForm" onsubmit="return joinWaitlist(event)">
      <input type="email" required placeholder="Enter your email address" id="wlEmail" aria-label="Email address"/>
      <button type="submit" id="wlBtn">Join Waitlist</button>
    </form>
    <p id="wlStatus" style="margin-top:14px;font-size:14px;min-height:20px;font-weight:600;"></p>
    <p class="wl-note">No spam. Just updates on courses, launches, and financial insights.</p>
  </div>
</section>
